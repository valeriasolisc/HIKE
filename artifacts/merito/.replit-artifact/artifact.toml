kind = "web"
previewPath = "/"
title = "MÉRITO — Identidad Profesional"
version = "1.0.0"
id = "artifacts/merito"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22235

[services.development]
run = "pnpm --filter @workspace/merito run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/merito", "run", "build" ]
publicDir = "artifacts/merito/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22235"
BASE_PATH = "/"
